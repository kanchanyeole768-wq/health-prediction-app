<!DOCTYPE html>
<html>
<head>
    <title>Health Prediction App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Health Prediction Application
    </h1>

    <div class="card p-4">

        <form method="POST">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" name="dob" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Glucose</label>
                <input type="number" name="glucose" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Haemoglobin</label>
                <input type="number" name="haemoglobin" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Cholesterol</label>
                <input type="number" name="cholesterol" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">
                Save Patient
            </button>

        </form>

        <hr>

        <h3>Patient Records</h3>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>DOB</th>
                    <th>Email</th>
                    <th>Glucose</th>
                    <th>Haemoglobin</th>
                    <th>Cholesterol</th>
                    <th>Remarks</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody>

                {% for patient in patients %}

                <tr>
                    <td>{{ patient[0] }}</td>
                    <td>{{ patient[1] }}</td>
                    <td>{{ patient[2] }}</td>
                    <td>{{ patient[3] }}</td>
                    <td>{{ patient[4] }}</td>
                    <td>{{ patient[5] }}</td>
                    <td>{{ patient[6] }}</td>
                    <td>{{ patient[7] }}</td>

                    <td>
                        <a href="/delete/{{ patient[0] }}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
